<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Практика по CSS псевдоклассам</title>
    <style>
        button { padding: 10px 15px; background-color: blue; color: white; border: none; border-radius: 4px; cursor: pointer;  }
        button:hover { background-color: green; }
        input { padding: 8px; border: 2px solid black; outline: none; }
        input:focus { border-color: blue; }

        ul li:first-child { font-weight: bold; color: green; }
        ul li:last-child { font-style: italic; color: red; }

        .block-links a { color: blue; font-weight: bold; }
        .block-links a:hover { color: pink; }
        .block-text p:nth-child(odd) { background-color: lightblue; }

        .combo-container p:first-child:hover { color: pink; font-weight: bold; cursor: pointer; }
        .combo-container input:last-child:focus { border-color: red; }
    </style>
</head>
<body>
        <h2>Задание 1</h2>
        <form>
            <input type="text" placeholder="Поле ввода">
            <button type="button">Кнопка</button>
        </form>

        <h2>Задание 2</h2>
        <ul>
            <li>Первый элемент списка</li>
            <li>Второй элемент списка</li>
            <li>Третий элемент списка</li>
            <li>Четвертый элемент списка</li>
        </ul>

        <h2>Задание 3</h2>
        <div class="block-links">
            <p>Текстовой элемент: <a href="https://web.whatsapp.com/">Ссылка</a></p>
        </div>
        <div class="block-text">
            <p>Абзац 1</p>
            <p>Абзац 2</p>
            <p>Абзац 3</p>
            <p>Абзац 4</p>
        </div>

        <h2>Задание 4</h2>
        <div class="combo-container">
            <p>Изменяется при наведении курсора</p>
            <p>Без изменений</p>
            <input type="text" placeholder="Поле ввода">
        </div>
</body>
</html>
